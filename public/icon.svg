<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="180" height="180" rx="24" fill="#0a0a0a"/>
  <rect x="4" y="4" width="172" height="172" rx="20" stroke="#ff6b4a" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Terminal-style "AH" monogram -->
  <!-- A -->
  <path d="M44 130 L72 50 L100 130" stroke="#ff6b4a" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <line x1="54" y1="100" x2="90" y2="100" stroke="#ff6b4a" stroke-width="8" stroke-linecap="round"/>
  <!-- H -->
  <line x1="112" y1="50" x2="112" y2="130" stroke="#ff6b4a" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="50" x2="148" y2="130" stroke="#ff6b4a" stroke-width="10" stroke-linecap="round"/>
  <line x1="112" y1="90" x2="148" y2="90" stroke="#ff6b4a" stroke-width="8" stroke-linecap="round"/>
  <!-- Subtle glow effect -->
  <rect x="4" y="4" width="172" height="172" rx="20" stroke="#ff6b4a" stroke-width="1" fill="none" opacity="0.3" filter="url(#glow)"/>
  <defs>
    <filter id="glow" x="-4" y="-4" width="188" height="188">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
